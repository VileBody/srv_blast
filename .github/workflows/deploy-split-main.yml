name: Deploy Main (Split Prod/Infra)

on:
  push:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy (optional, defaults to selected ref)"
        required: false
        type: string
      target:
        description: "Which stack to deploy"
        required: true
        default: all
        type: choice
        options:
          - all
          - prod-path
          - infra-ops

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-split-${{ github.event_name == 'workflow_dispatch' && (inputs.branch != '' && inputs.branch || github.ref_name) || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-images:
    if: ${{ vars.DEPLOY_SPLIT_ENABLED == 'true' && (github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'prod-path' || inputs.target == 'infra-ops') }}
    name: Build Images
    runs-on: [self-hosted, blast-deploy-infra]
    timeout-minutes: 60
    env:
      GITHUB_TOKEN: ${{ github.token }}
    outputs:
      registry: ${{ steps.images.outputs.registry }}
      runtime_image: ${{ steps.images.outputs.runtime_image }}
      tg_bot_image: ${{ steps.images.outputs.tg_bot_image }}
      tg_bot_public_image: ${{ steps.images.outputs.tg_bot_public_image }}
      asset_ui_image: ${{ steps.images.outputs.asset_ui_image }}
      finance_bot_image: ${{ steps.images.outputs.finance_bot_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch != '' && inputs.branch || github.ref_name }}

      - name: Define image refs
        id: images
        run: |
          set -euo pipefail
          owner_lc="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          prefix="ghcr.io/${owner_lc}/srv-blast"
          tag="$(git rev-parse HEAD)"
          {
            echo "registry=ghcr.io"
            echo "image_prefix=${prefix}"
            echo "image_tag=${tag}"
            echo "runtime_image=${prefix}/runtime:${tag}"
            echo "tg_bot_image=${prefix}/tg-bot:${tag}"
            echo "tg_bot_public_image=${prefix}/tg-bot-public:${tag}"
            echo "asset_ui_image=${prefix}/asset-ui:${tag}"
            echo "finance_bot_image=${prefix}/finance-bot:${tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: |
          set -euo pipefail
          printf '%s\n' "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Build/push missing images
        env:
          BLAST_IMAGE_PREFIX: ${{ steps.images.outputs.image_prefix }}
          BLAST_IMAGE_TAG: ${{ steps.images.outputs.image_tag }}
          BLAST_IMAGE_PLATFORM: linux/amd64
          BLAST_IMAGE_REGISTRY_USERNAME: ${{ github.actor }}
          BLAST_IMAGE_REGISTRY_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash infra/runners/build_push_images.sh

  deploy-prod-path:
    needs:
      - build-images
    if: ${{ vars.DEPLOY_SPLIT_ENABLED == 'true' && (github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'prod-path') }}
    name: Deploy Prod Path (Fan-out)
    runs-on: [self-hosted, blast-deploy-infra]
    timeout-minutes: 30
    env:
      REPO_DIR: ${{ vars.BLAST_REPO_DIR_INFRA != '' && vars.BLAST_REPO_DIR_INFRA || vars.BLAST_REPO_DIR }}
      INPUT_BRANCH: ${{ inputs.branch }}
      REF_NAME: ${{ github.ref_name }}
      GIT_AUTH_TOKEN: ${{ secrets.DEPLOY_GH_TOKEN }}
      GITHUB_TOKEN_FALLBACK: ${{ github.token }}
      DEPLOY_USE_PREBUILT_IMAGES: "true"
      BLAST_IMAGE_REGISTRY: ${{ needs.build-images.outputs.registry }}
      BLAST_IMAGE_REGISTRY_USERNAME: ${{ github.actor }}
      BLAST_IMAGE_REGISTRY_TOKEN: ${{ github.token }}
      BLAST_RUNTIME_IMAGE: ${{ needs.build-images.outputs.runtime_image }}
      BLAST_TG_BOT_IMAGE: ${{ needs.build-images.outputs.tg_bot_image }}
      BLAST_TG_BOT_PUBLIC_IMAGE: ${{ needs.build-images.outputs.tg_bot_public_image }}
      BLAST_ASSET_UI_IMAGE: ${{ needs.build-images.outputs.asset_ui_image }}
      BLAST_FINANCE_BOT_IMAGE: ${{ needs.build-images.outputs.finance_bot_image }}
      DEPLOY_PRUNE_OTHER_STACK: ${{ vars.DEPLOY_PRUNE_OTHER_STACK }}
      PROD_TG_WEBHOOK_IP_ADDRESS: ${{ vars.PROD_TG_WEBHOOK_IP_ADDRESS }}
      DEPLOY_ORCHESTRATOR_HA: ${{ vars.DEPLOY_ORCHESTRATOR_HA }}
      DEPLOY_ORCHESTRATOR_HA_COMPOSE_FILE: ${{ vars.DEPLOY_ORCHESTRATOR_HA_COMPOSE_FILE }}
      DEPLOY_PROD_NODE0_HOST: ${{ vars.DEPLOY_PROD_NODE0_HOST }}
      DEPLOY_PROD_NODE0_USER: ${{ vars.DEPLOY_PROD_NODE0_USER }}
      DEPLOY_PROD_NODE0_PORT: ${{ vars.DEPLOY_PROD_NODE0_PORT }}
      DEPLOY_PROD_NODE0_REPO_DIR: ${{ vars.DEPLOY_PROD_NODE0_REPO_DIR }}
      DEPLOY_PROD_NODE1_HOST: ${{ vars.DEPLOY_PROD_NODE1_HOST }}
      DEPLOY_PROD_NODE1_USER: ${{ vars.DEPLOY_PROD_NODE1_USER }}
      DEPLOY_PROD_NODE1_PORT: ${{ vars.DEPLOY_PROD_NODE1_PORT }}
      DEPLOY_PROD_NODE1_REPO_DIR: ${{ vars.DEPLOY_PROD_NODE1_REPO_DIR }}
      DEPLOY_PROD_NODE0_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_PROD_NODE0_SSH_PRIVATE_KEY }}
      DEPLOY_PROD_NODE1_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_PROD_NODE1_SSH_PRIVATE_KEY }}
    steps:
      - name: Validate Runner Repo Path + Fan-out Vars
        run: |
          set -euo pipefail
          if [ -z "${REPO_DIR:-}" ]; then
            echo "Repository variable BLAST_REPO_DIR_INFRA (or BLAST_REPO_DIR) is not set"
            exit 1
          fi
          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "REPO_DIR does not point to a git repo: $REPO_DIR"
            exit 1
          fi
          required_vars=(
            DEPLOY_PROD_NODE0_HOST
            DEPLOY_PROD_NODE0_REPO_DIR
            DEPLOY_PROD_NODE1_HOST
            DEPLOY_PROD_NODE1_REPO_DIR
          )
          for key in "${required_vars[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Required repository variable is missing: $key"
              exit 1
            fi
          done
          if [ -z "${DEPLOY_PROD_NODE0_SSH_PRIVATE_KEY:-}" ] || [ -z "${DEPLOY_PROD_NODE1_SSH_PRIVATE_KEY:-}" ]; then
            echo "Required secrets are missing: DEPLOY_PROD_NODE0_SSH_PRIVATE_KEY / DEPLOY_PROD_NODE1_SSH_PRIVATE_KEY"
            exit 1
          fi

      - name: Sync runner repo to deploy ref
        run: |
          set -euo pipefail
          BRANCH="${INPUT_BRANCH:-$REF_NAME}"
          if [ -z "$BRANCH" ]; then
            echo "Branch is empty"
            exit 1
          fi
          token="${GIT_AUTH_TOKEN:-$GITHUB_TOKEN_FALLBACK}"
          git config --global --add safe.directory "$REPO_DIR" || true
          git -C "$REPO_DIR" \
            -c "url.https://x-access-token:${token}@github.com/.insteadof=git@github.com:" \
            -c "url.https://x-access-token:${token}@github.com/.insteadof=ssh://git@github.com/" \
            -c "url.https://x-access-token:${token}@github.com/.insteadof=https://github.com/" \
            fetch origin "$BRANCH"
          if git -C "$REPO_DIR" show-ref --verify --quiet "refs/heads/$BRANCH"; then
            git -C "$REPO_DIR" checkout -f "$BRANCH"
          else
            git -C "$REPO_DIR" checkout -B "$BRANCH" "origin/$BRANCH"
          fi
          git -C "$REPO_DIR" reset --hard "origin/$BRANCH"

      - name: Deploy prod-path fan-out to orchestrator-0 and orchestrator-1
        run: |
          set -euo pipefail
          BRANCH="${INPUT_BRANCH:-$REF_NAME}"
          if [ -z "$BRANCH" ]; then
            echo "Branch is empty"
            exit 1
          fi
          install -d -m 700 "$HOME/.ssh"
          key_node0="$HOME/.ssh/deploy_prod_node0_ci"
          key_node1="$HOME/.ssh/deploy_prod_node1_ci"
          printf '%s\n' "$DEPLOY_PROD_NODE0_SSH_PRIVATE_KEY" > "$key_node0"
          printf '%s\n' "$DEPLOY_PROD_NODE1_SSH_PRIVATE_KEY" > "$key_node1"
          chmod 600 "$key_node0" "$key_node1"
          cleanup_keys() {
            rm -f "$key_node0" "$key_node1"
          }
          trap cleanup_keys EXIT

          DEPLOY_REMOTE_NODE0_HOST="$DEPLOY_PROD_NODE0_HOST" \
          DEPLOY_REMOTE_NODE0_USER="${DEPLOY_PROD_NODE0_USER:-deploy}" \
          DEPLOY_REMOTE_NODE0_PORT="${DEPLOY_PROD_NODE0_PORT:-22}" \
          DEPLOY_REMOTE_NODE0_REPO_DIR="$DEPLOY_PROD_NODE0_REPO_DIR" \
          DEPLOY_REMOTE_NODE0_SSH_KEY_PATH="$key_node0" \
          DEPLOY_REMOTE_NODE1_HOST="$DEPLOY_PROD_NODE1_HOST" \
          DEPLOY_REMOTE_NODE1_USER="${DEPLOY_PROD_NODE1_USER:-deploy}" \
          DEPLOY_REMOTE_NODE1_PORT="${DEPLOY_PROD_NODE1_PORT:-22}" \
          DEPLOY_REMOTE_NODE1_REPO_DIR="$DEPLOY_PROD_NODE1_REPO_DIR" \
          DEPLOY_REMOTE_NODE1_SSH_KEY_PATH="$key_node1" \
          PROD_TG_WEBHOOK_IP_ADDRESS="$PROD_TG_WEBHOOK_IP_ADDRESS" \
          bash "$REPO_DIR/infra/runners/deploy_remote_fanout.sh" "$BRANCH" "prod-path"

  deploy-infra-ops:
    needs:
      - build-images
      - deploy-prod-path
    if: ${{ always() && vars.DEPLOY_SPLIT_ENABLED == 'true' && (github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'infra-ops') && needs.build-images.result == 'success' && needs.deploy-prod-path.result != 'failure' && needs.deploy-prod-path.result != 'cancelled' }}
    name: Deploy Infra Ops
    runs-on: [self-hosted, blast-deploy-infra]
    timeout-minutes: 30
    env:
      REPO_DIR: ${{ vars.BLAST_REPO_DIR_INFRA != '' && vars.BLAST_REPO_DIR_INFRA || vars.BLAST_REPO_DIR }}
      INPUT_BRANCH: ${{ inputs.branch }}
      REF_NAME: ${{ github.ref_name }}
      GIT_AUTH_TOKEN: ${{ secrets.DEPLOY_GH_TOKEN }}
      GITHUB_TOKEN_FALLBACK: ${{ github.token }}
      DEPLOY_USE_PREBUILT_IMAGES: "true"
      BLAST_IMAGE_REGISTRY: ${{ needs.build-images.outputs.registry }}
      BLAST_IMAGE_REGISTRY_USERNAME: ${{ github.actor }}
      BLAST_IMAGE_REGISTRY_TOKEN: ${{ github.token }}
      BLAST_RUNTIME_IMAGE: ${{ needs.build-images.outputs.runtime_image }}
      BLAST_TG_BOT_IMAGE: ${{ needs.build-images.outputs.tg_bot_image }}
      BLAST_TG_BOT_PUBLIC_IMAGE: ${{ needs.build-images.outputs.tg_bot_public_image }}
      BLAST_ASSET_UI_IMAGE: ${{ needs.build-images.outputs.asset_ui_image }}
      BLAST_FINANCE_BOT_IMAGE: ${{ needs.build-images.outputs.finance_bot_image }}
      DEPLOY_PRUNE_OTHER_STACK: ${{ vars.DEPLOY_PRUNE_OTHER_STACK }}
      INFRA_ORCHESTRATOR_PUBLIC_URL: ${{ vars.INFRA_ORCHESTRATOR_PUBLIC_URL }}
      INFRA_ADMIN_PANEL_PUBLIC_URL: ${{ vars.INFRA_ADMIN_PANEL_PUBLIC_URL }}
    steps:
      - name: Validate Runner Repo Path
        run: |
          set -euo pipefail
          if [ -z "${REPO_DIR:-}" ]; then
            echo "Repository variable BLAST_REPO_DIR_INFRA (or BLAST_REPO_DIR) is not set"
            exit 1
          fi
          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "REPO_DIR does not point to a git repo: $REPO_DIR"
            exit 1
          fi

      - name: Sync runner repo to deploy ref
        run: |
          set -euo pipefail
          BRANCH="${INPUT_BRANCH:-$REF_NAME}"
          if [ -z "$BRANCH" ]; then
            echo "Branch is empty"
            exit 1
          fi
          token="${GIT_AUTH_TOKEN:-$GITHUB_TOKEN_FALLBACK}"
          git config --global --add safe.directory "$REPO_DIR" || true
          git -C "$REPO_DIR" \
            -c "url.https://x-access-token:${token}@github.com/.insteadof=git@github.com:" \
            -c "url.https://x-access-token:${token}@github.com/.insteadof=ssh://git@github.com/" \
            -c "url.https://x-access-token:${token}@github.com/.insteadof=https://github.com/" \
            fetch origin "$BRANCH"
          if git -C "$REPO_DIR" show-ref --verify --quiet "refs/heads/$BRANCH"; then
            git -C "$REPO_DIR" checkout -f "$BRANCH"
          else
            git -C "$REPO_DIR" checkout -B "$BRANCH" "origin/$BRANCH"
          fi
          git -C "$REPO_DIR" reset --hard "origin/$BRANCH"

      - name: Deploy infra-ops stack
        run: |
          set -euo pipefail
          BRANCH="${INPUT_BRANCH:-$REF_NAME}"
          if [ -z "$BRANCH" ]; then
            echo "Branch is empty"
            exit 1
          fi
          bash "$REPO_DIR/infra/runners/deploy_branch.sh" "$BRANCH" "infra-ops"
