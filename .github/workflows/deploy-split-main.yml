name: Deploy Main (Split Prod/Infra)

on:
  push:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy (optional, defaults to selected ref)"
        required: false
        type: string
      target:
        description: "Which stack to deploy"
        required: true
        default: all
        type: choice
        options:
          - all
          - prod-path
          - infra-ops

permissions:
  contents: read

concurrency:
  group: deploy-split-${{ github.event_name == 'workflow_dispatch' && (inputs.branch != '' && inputs.branch || github.ref_name) || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-prod-path:
    if: ${{ vars.DEPLOY_SPLIT_ENABLED == 'true' && (github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'prod-path') }}
    name: Deploy Prod Path
    runs-on: [self-hosted, blast-deploy-prod]
    timeout-minutes: 30
    env:
      REPO_DIR: ${{ vars.BLAST_REPO_DIR_PROD != '' && vars.BLAST_REPO_DIR_PROD || vars.BLAST_REPO_DIR }}
      INPUT_BRANCH: ${{ inputs.branch }}
      REF_NAME: ${{ github.ref_name }}
      GIT_AUTH_TOKEN: ${{ secrets.DEPLOY_GH_TOKEN }}
      GITHUB_TOKEN_FALLBACK: ${{ github.token }}
      DEPLOY_PRUNE_OTHER_STACK: ${{ vars.DEPLOY_PRUNE_OTHER_STACK }}
      DEPLOY_ORCHESTRATOR_HA: ${{ vars.DEPLOY_ORCHESTRATOR_HA }}
      DEPLOY_ORCHESTRATOR_HA_COMPOSE_FILE: ${{ vars.DEPLOY_ORCHESTRATOR_HA_COMPOSE_FILE }}
      DEPLOY_PROD_REMOTE_ENABLED: ${{ vars.DEPLOY_PROD_REMOTE_ENABLED }}
      DEPLOY_PROD_REMOTE_HOST: ${{ vars.DEPLOY_PROD_REMOTE_HOST }}
      DEPLOY_PROD_REMOTE_USER: ${{ vars.DEPLOY_PROD_REMOTE_USER }}
      DEPLOY_PROD_REMOTE_PORT: ${{ vars.DEPLOY_PROD_REMOTE_PORT }}
      DEPLOY_PROD_REMOTE_REPO_DIR: ${{ vars.DEPLOY_PROD_REMOTE_REPO_DIR }}
      DEPLOY_PROD_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_PROD_SSH_PRIVATE_KEY }}
    steps:
      - name: Validate Runner Repo Path
        run: |
          set -euo pipefail
          if [ -z "${REPO_DIR:-}" ]; then
            echo "Repository variable BLAST_REPO_DIR_PROD (or BLAST_REPO_DIR) is not set"
            exit 1
          fi
          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "REPO_DIR does not point to a git repo: $REPO_DIR"
            exit 1
          fi

      - name: Deploy prod-path stack
        run: |
          set -euo pipefail
          BRANCH="${INPUT_BRANCH:-$REF_NAME}"
          if [ -z "$BRANCH" ]; then
            echo "Branch is empty"
            exit 1
          fi
          remote_flag="$(printf '%s' "${DEPLOY_PROD_REMOTE_ENABLED:-}" | tr '[:upper:]' '[:lower:]')"
          if [ "$remote_flag" = "1" ] || [ "$remote_flag" = "true" ] || [ "$remote_flag" = "yes" ] || [ "$remote_flag" = "on" ]; then
            if [ -z "${DEPLOY_PROD_REMOTE_HOST:-}" ] || [ -z "${DEPLOY_PROD_REMOTE_REPO_DIR:-}" ]; then
              echo "DEPLOY_PROD_REMOTE_ENABLED=true requires DEPLOY_PROD_REMOTE_HOST and DEPLOY_PROD_REMOTE_REPO_DIR"
              exit 1
            fi
            if [ -z "${DEPLOY_PROD_SSH_PRIVATE_KEY:-}" ]; then
              echo "DEPLOY_PROD_REMOTE_ENABLED=true requires secret DEPLOY_PROD_SSH_PRIVATE_KEY"
              exit 1
            fi
            install -d -m 700 "$HOME/.ssh"
            key_path="$HOME/.ssh/deploy_prod_ci"
            printf '%s\n' "$DEPLOY_PROD_SSH_PRIVATE_KEY" > "$key_path"
            chmod 600 "$key_path"
            cleanup_key() {
              rm -f "$key_path"
            }
            trap cleanup_key EXIT

            DEPLOY_REMOTE_HOST="$DEPLOY_PROD_REMOTE_HOST" \
            DEPLOY_REMOTE_USER="${DEPLOY_PROD_REMOTE_USER:-deploy}" \
            DEPLOY_REMOTE_PORT="${DEPLOY_PROD_REMOTE_PORT:-22}" \
            DEPLOY_REMOTE_REPO_DIR="$DEPLOY_PROD_REMOTE_REPO_DIR" \
            DEPLOY_REMOTE_SSH_KEY_PATH="$key_path" \
            bash "$REPO_DIR/infra/runners/deploy_remote_branch.sh" "$BRANCH" "prod-path"
          else
            bash "$REPO_DIR/infra/runners/deploy_branch.sh" "$BRANCH" "prod-path"
          fi

      - name: Deploy Orchestrator Nginx (optional)
        env:
          BRANCH: ${{ inputs.branch != '' && inputs.branch || github.ref_name }}
          ORCHESTRATOR_NGINX_DEPLOY_ENABLED: ${{ vars.ORCHESTRATOR_NGINX_DEPLOY_ENABLED }}
          ORCHESTRATOR_NGINX_MAIN_ONLY: ${{ vars.ORCHESTRATOR_NGINX_MAIN_ONLY }}
          ORCHESTRATOR_NGINX_MAIN_BRANCH: ${{ vars.ORCHESTRATOR_NGINX_MAIN_BRANCH }}
          ORCHESTRATOR_NGINX_UPSTREAM_TEMPLATE: ${{ vars.ORCHESTRATOR_NGINX_UPSTREAM_TEMPLATE }}
          ORCHESTRATOR_NGINX_LOCATIONS_TEMPLATE: ${{ vars.ORCHESTRATOR_NGINX_LOCATIONS_TEMPLATE }}
          ORCHESTRATOR_NGINX_UPSTREAM_TARGET: ${{ vars.ORCHESTRATOR_NGINX_UPSTREAM_TARGET }}
          ORCHESTRATOR_NGINX_LOCATIONS_TARGET: ${{ vars.ORCHESTRATOR_NGINX_LOCATIONS_TARGET }}
          ORCHESTRATOR_NGINX_RELOAD_CMD: ${{ vars.ORCHESTRATOR_NGINX_RELOAD_CMD }}
        run: |
          set -euo pipefail
          bash "$REPO_DIR/infra/runners/deploy_orchestrator_nginx.sh" "$BRANCH"

  deploy-infra-ops:
    if: ${{ vars.DEPLOY_SPLIT_ENABLED == 'true' && (github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'infra-ops') }}
    name: Deploy Infra Ops
    runs-on: [self-hosted, blast-deploy-infra]
    timeout-minutes: 30
    env:
      REPO_DIR: ${{ vars.BLAST_REPO_DIR_INFRA != '' && vars.BLAST_REPO_DIR_INFRA || vars.BLAST_REPO_DIR }}
      INPUT_BRANCH: ${{ inputs.branch }}
      REF_NAME: ${{ github.ref_name }}
      GIT_AUTH_TOKEN: ${{ secrets.DEPLOY_GH_TOKEN }}
      GITHUB_TOKEN_FALLBACK: ${{ github.token }}
      DEPLOY_PRUNE_OTHER_STACK: ${{ vars.DEPLOY_PRUNE_OTHER_STACK }}
    steps:
      - name: Validate Runner Repo Path
        run: |
          set -euo pipefail
          if [ -z "${REPO_DIR:-}" ]; then
            echo "Repository variable BLAST_REPO_DIR_INFRA (or BLAST_REPO_DIR) is not set"
            exit 1
          fi
          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "REPO_DIR does not point to a git repo: $REPO_DIR"
            exit 1
          fi

      - name: Deploy infra-ops stack
        run: |
          set -euo pipefail
          BRANCH="${INPUT_BRANCH:-$REF_NAME}"
          if [ -z "$BRANCH" ]; then
            echo "Branch is empty"
            exit 1
          fi
          bash "$REPO_DIR/infra/runners/deploy_branch.sh" "$BRANCH" "infra-ops"
