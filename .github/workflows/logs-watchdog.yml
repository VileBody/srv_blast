name: Logs Pipeline Watchdog

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  watchdog-logs-service:
    if: ${{ vars.DEPLOY_SPLIT_ENABLED == 'true' }}
    name: Watchdog Logs Service
    runs-on: [self-hosted, blast-deploy-infra]
    timeout-minutes: 15
    env:
      REPO_DIR: ${{ vars.BLAST_REPO_DIR_INFRA != '' && vars.BLAST_REPO_DIR_INFRA || vars.BLAST_REPO_DIR }}
    steps:
      - name: Validate and run healthcheck
        run: |
          set -euo pipefail
          if [ -z "${REPO_DIR:-}" ]; then
            echo "BLAST_REPO_DIR_INFRA (or BLAST_REPO_DIR) is not set"
            exit 1
          fi
          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "REPO_DIR does not point to a git repo: $REPO_DIR"
            exit 1
          fi
          logs_env="${REPO_DIR}/infra/runners/.env.logs-backup"
          if [ ! -f "$logs_env" ]; then
            echo "logs env not found: $logs_env"
            exit 1
          fi

          set -a
          . "$logs_env"
          set +a

          logs_python=""
          logs_probe='import boto3, httpx, asyncpg, docker  # noqa: F401'
          logs_pkgs=(boto3 httpx asyncpg docker)

          if [ -x /opt/blast-logs-venv/bin/python ]; then
            logs_python="/opt/blast-logs-venv/bin/python"
            if ! "$logs_python" -c "$logs_probe" >/dev/null 2>&1; then
              echo "logs deps missing in /opt/blast-logs-venv; trying to install"
              if ! "$logs_python" -m pip install --upgrade pip; then
                logs_python=""
              elif ! "$logs_python" -m pip install "${logs_pkgs[@]}"; then
                logs_python=""
              fi
            fi
          fi

          if [ -z "$logs_python" ]; then
            if ! command -v python3 >/dev/null 2>&1; then
              echo "python3 is required for logs watchdog healthcheck"
              exit 1
            fi
            logs_venv="${RUNNER_TEMP:-/tmp}/logs-watchdog-venv"
            rm -rf "$logs_venv"
            python3 -m venv "$logs_venv"
            "$logs_venv/bin/pip" install --upgrade pip
            "$logs_venv/bin/pip" install "${logs_pkgs[@]}"
            logs_python="$logs_venv/bin/python"
          fi

          cd "$REPO_DIR"
          if "$logs_python" scripts/logs_pipeline.py healthcheck --max-lag-min "${LOG_BACKUP_MAX_LAG_MIN:-90}"; then
            echo "logs healthcheck passed on logs-service"
            exit 0
          fi

          echo "logs healthcheck failed, trying blast-logs-hourly.service restart"
          if [ "$(id -u)" -eq 0 ]; then
            systemctl start blast-logs-hourly.service || true
          elif command -v sudo >/dev/null 2>&1; then
            sudo systemctl start blast-logs-hourly.service || true
          else
            echo "sudo is not available to restart blast-logs-hourly.service"
          fi

          echo "logs watchdog forced restart on logs-service"
          exit 1
