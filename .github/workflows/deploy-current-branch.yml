name: Deploy Current Branch

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy (optional, defaults to selected ref)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.branch != '' && inputs.branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy On Self-Hosted Runner
    runs-on: [self-hosted, blast-deploy]
    timeout-minutes: 30
    steps:
      - name: Validate Runner Repo Path
        env:
          REPO_DIR: ${{ vars.BLAST_REPO_DIR }}
        run: |
          set -euo pipefail
          if [ -z "${REPO_DIR:-}" ]; then
            echo "Repository variable BLAST_REPO_DIR is not set"
            exit 1
          fi
          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "BLAST_REPO_DIR does not point to a git repo: $REPO_DIR"
            exit 1
          fi

      - name: Deploy Branch
        env:
          REPO_DIR: ${{ vars.BLAST_REPO_DIR }}
          BRANCH: ${{ inputs.branch != '' && inputs.branch || github.ref_name }}
          GIT_AUTH_TOKEN: ${{ secrets.DEPLOY_GH_TOKEN }}
          GITHUB_TOKEN_FALLBACK: ${{ github.token }}
        run: |
          set -euo pipefail
          # Bootstrap for legacy server states where this runtime file was tracked and modified.
          if git -C "$REPO_DIR" ls-files --error-unmatch data/footage_inventory_selected.json >/dev/null 2>&1; then
            git -C "$REPO_DIR" restore --staged --worktree -- data/footage_inventory_selected.json || true
          fi

          # Legacy conflict: in some server states this file exists as untracked,
          # and checkout of branches where it's tracked fails.
          if [ -e "$REPO_DIR/services/tg_bot_botapi/migrations/001_init.sql" ] && \
             ! git -C "$REPO_DIR" ls-files --error-unmatch services/tg_bot_botapi/migrations/001_init.sql >/dev/null 2>&1; then
            rm -f "$REPO_DIR/services/tg_bot_botapi/migrations/001_init.sql"
          fi

          bash "$REPO_DIR/infra/runners/deploy_branch.sh" "$BRANCH"
