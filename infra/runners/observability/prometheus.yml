global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    env: prod

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: orchestrator-api
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ["192.168.0.8:18000"]
        labels:
          node: orchestrator-0
      - targets: ["192.168.0.11:18000"]
        labels:
          node: orchestrator-1

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]
