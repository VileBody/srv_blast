services:
  orchestrator-api:
    image: ${BLAST_RUNTIME_IMAGE:-blast_final-runtime:local}
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: orchestrator-api
    env_file:
      - .env
    environment:
      WORK_DIR: /app/work
      OUTPUT_DIR: /app/output
      PINS_DIR: /app/pins
      DESCRIPTIONS_DIR: /app/descriptions

      # shared artifacts paths
      FOOTAGE_INVENTORY_OUT: /app/data/footage_inventory.json
      DESCRIPTIONS_BUNDLE_OUT: /app/pins/descriptions_bundle_selected.json

      # inputs
      FOOTAGE_DIR: /app/footage
      FOOTAGE_DESCRIPTIONS_DIR: /app/descriptions
      STATIC_ASSETS_SOURCE_INDEX_JSON: /app/data/static_assets_index_1to1.json
      STATIC_ASSETS_INDEX_JSON: /app/data/static_assets_index_1to1.json
      STATIC_ASSETS_ENRICH_INDEX_JSON: /app/data/static_assets_index_1to1.json
      S3_ASSET_PREFIX: pinterest_collection/pins2_1to1_20260323
      FOOTAGE_S3_PREFLIGHT_MODE: ${FOOTAGE_S3_PREFLIGHT_MODE:-strict}

      # point mlcore to shared paths
      FOOTAGE_INVENTORY_JSON: /app/data/footage_inventory.json
      DESCRIPTIONS_BUNDLE_PATH: /app/pins/descriptions_bundle_selected.json
    volumes:
      - ./work:/app/work
      - ./output:/app/output
      - ./out:/app/out
      - ./data:/app/data
      - ./pins:/app/pins
      - ./descriptions:/app/descriptions:ro
      - ./audio:/app/audio:ro
    ports:
      - "${ORCHESTRATOR_API_BIND_HOST:-127.0.0.1}:18000:8000"
    command: >
      bash -lc "python footage_config.py && python -m services.orchestrator.run_uvicorn"
    restart: unless-stopped

  worker-build:
    image: ${BLAST_RUNTIME_IMAGE:-blast_final-runtime:local}
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: worker-build
    env_file:
      - .env
    environment:
      WORK_DIR: /app/work
      OUTPUT_DIR: /app/output
      PINS_DIR: /app/pins
      DESCRIPTIONS_DIR: /app/descriptions

      # shared artifacts paths
      FOOTAGE_INVENTORY_OUT: /app/data/footage_inventory.json
      DESCRIPTIONS_BUNDLE_OUT: /app/pins/descriptions_bundle_selected.json

      # inputs
      FOOTAGE_DIR: /app/footage
      FOOTAGE_DESCRIPTIONS_DIR: /app/descriptions
      STATIC_ASSETS_SOURCE_INDEX_JSON: /app/data/static_assets_index_1to1.json
      STATIC_ASSETS_INDEX_JSON: /app/data/static_assets_index_1to1.json
      STATIC_ASSETS_ENRICH_INDEX_JSON: /app/data/static_assets_index_1to1.json
      S3_ASSET_PREFIX: pinterest_collection/pins2_1to1_20260323
      FOOTAGE_S3_PREFLIGHT_MODE: ${FOOTAGE_S3_PREFLIGHT_MODE:-strict}

      # point mlcore to shared paths
      FOOTAGE_INVENTORY_JSON: /app/data/footage_inventory.json
      DESCRIPTIONS_BUNDLE_PATH: /app/pins/descriptions_bundle_selected.json
    volumes:
      - ./work:/app/work
      - ./output:/app/output
      - ./out:/app/out
      - ./data:/app/data
      - ./pins:/app/pins
      - ./descriptions:/app/descriptions:ro
      - ./audio:/app/audio:ro
    command: >
      bash -lc "python footage_config.py && celery -A services.orchestrator.celery_app:celery_app worker -l INFO --concurrency=${WORKER_BUILD_CONCURRENCY:-4} -Q ${CELERY_QUEUE_BUILD:-build}"
    restart: unless-stopped

  worker-render:
    image: ${BLAST_RUNTIME_IMAGE:-blast_final-runtime:local}
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: worker-render
    env_file:
      - .env
    environment:
      WORK_DIR: /app/work
      OUTPUT_DIR: /app/output
      PINS_DIR: /app/pins
      DESCRIPTIONS_DIR: /app/descriptions

      # shared artifacts paths
      FOOTAGE_INVENTORY_OUT: /app/data/footage_inventory.json
      DESCRIPTIONS_BUNDLE_OUT: /app/pins/descriptions_bundle_selected.json

      # inputs
      FOOTAGE_DIR: /app/footage
      FOOTAGE_DESCRIPTIONS_DIR: /app/descriptions
      STATIC_ASSETS_SOURCE_INDEX_JSON: /app/data/static_assets_index_1to1.json
      STATIC_ASSETS_INDEX_JSON: /app/data/static_assets_index_1to1.json
      STATIC_ASSETS_ENRICH_INDEX_JSON: /app/data/static_assets_index_1to1.json
      S3_ASSET_PREFIX: pinterest_collection/pins2_1to1_20260323
      FOOTAGE_S3_PREFLIGHT_MODE: ${FOOTAGE_S3_PREFLIGHT_MODE:-strict}

      # point mlcore to shared paths
      FOOTAGE_INVENTORY_JSON: /app/data/footage_inventory.json
      DESCRIPTIONS_BUNDLE_PATH: /app/pins/descriptions_bundle_selected.json
    volumes:
      - ./work:/app/work
      - ./output:/app/output
      - ./out:/app/out
      - ./data:/app/data
      - ./pins:/app/pins
      - ./descriptions:/app/descriptions:ro
      - ./audio:/app/audio:ro
    command: >
      bash -lc "python footage_config.py && celery -A services.orchestrator.celery_app:celery_app worker -l INFO --concurrency=1 -Q ${CELERY_QUEUE_RENDER:-render}"
    restart: unless-stopped

  worker-render-poll:
    image: ${BLAST_RUNTIME_IMAGE:-blast_final-runtime:local}
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: worker-render-poll
    env_file:
      - .env
    environment:
      WORK_DIR: /app/work
      OUTPUT_DIR: /app/output
      PINS_DIR: /app/pins
      DESCRIPTIONS_DIR: /app/descriptions

      # shared artifacts paths
      FOOTAGE_INVENTORY_OUT: /app/data/footage_inventory.json
      DESCRIPTIONS_BUNDLE_OUT: /app/pins/descriptions_bundle_selected.json

      # inputs
      FOOTAGE_DIR: /app/footage
      FOOTAGE_DESCRIPTIONS_DIR: /app/descriptions
      STATIC_ASSETS_SOURCE_INDEX_JSON: /app/data/static_assets_index_1to1.json
      STATIC_ASSETS_INDEX_JSON: /app/data/static_assets_index_1to1.json
      STATIC_ASSETS_ENRICH_INDEX_JSON: /app/data/static_assets_index_1to1.json
      S3_ASSET_PREFIX: pinterest_collection/pins2_1to1_20260323
      FOOTAGE_S3_PREFLIGHT_MODE: ${FOOTAGE_S3_PREFLIGHT_MODE:-strict}

      # point mlcore to shared paths
      FOOTAGE_INVENTORY_JSON: /app/data/footage_inventory.json
      DESCRIPTIONS_BUNDLE_PATH: /app/pins/descriptions_bundle_selected.json
    volumes:
      - ./work:/app/work
      - ./output:/app/output
      - ./out:/app/out
      - ./data:/app/data
      - ./pins:/app/pins
      - ./descriptions:/app/descriptions:ro
      - ./audio:/app/audio:ro
    command: >
      bash -lc '
        python footage_config.py &&
        render_queue="${CELERY_QUEUE_RENDER:-render}" &&
        poll_queue="${CELERY_QUEUE_RENDER_POLL:-}" &&
        if [ -z "$$poll_queue" ]; then
          case "$$render_queue" in
            render) poll_queue="render-poll" ;;
            render.*) poll_queue="render-poll.$${render_queue#render.}" ;;
            render-*) poll_queue="render-poll-$${render_queue#render-}" ;;
            *) poll_queue="$${render_queue}-poll" ;;
          esac
        fi &&
        celery -A services.orchestrator.celery_app:celery_app worker -l INFO --concurrency=1 -Q "$$poll_queue"
      '
    restart: unless-stopped

  tg-bot:
    image: ${BLAST_TG_BOT_IMAGE:-blast_final-tg-bot:local}
    build:
      context: .
      dockerfile: Dockerfile.tg-bot
      network: host
    container_name: tg-bot
    env_file:
      - .env
    environment:
      TG_BOT_API_ENV: ${TG_BOT_API_ENV:-prod}
      TG_TEST_BOT_TOKEN: ${TG_TEST_BOT_TOKEN:-}
      TG_TEST_CREDITS_DB_URL: ${TG_TEST_CREDITS_DB_URL:-}
      ORCHESTRATOR_PUBLIC_URL: ${ORCHESTRATOR_PUBLIC_URL:-http://orchestrator-api:8000}
      BOT_POLL_INTERVAL_S: ${BOT_POLL_INTERVAL_S:-5}
      BOT_TMP_DIR: ${BOT_TMP_DIR:-/app/work/tg_tmp}
      BOT_MAX_AUDIO_MB: ${BOT_MAX_AUDIO_MB:-5}
    volumes:
      - ./work:/app/work
    command: >
      bash -lc "python -m services.tg_bot_botapi.app"
    restart: unless-stopped

  tg-bot-public:
    image: ${BLAST_TG_BOT_PUBLIC_IMAGE:-blast_final-tg-bot-public:local}
    build:
      context: .
      dockerfile: Dockerfile.tg-bot-public
      network: host
    container_name: tg-bot-public
    env_file:
      - .env
    environment:
      TG_BOT_API_ENV: ${TG_BOT_API_ENV:-prod}
      TG_BOT_TOKEN: ${TG_BOT_PUBLIC_TOKEN}
      TG_BOT_USERNAME: ${TG_BOT_USERNAME:-blast808bot}
      TG_TEST_BOT_TOKEN: ${TG_TEST_BOT_TOKEN:-}
      TG_TEST_BOT_USERNAME: ${TG_TEST_BOT_USERNAME:-}
      TG_TEST_BYPASS_SUBSCRIPTION: ${TG_TEST_BYPASS_SUBSCRIPTION:-0}
      TG_TEST_CREDITS_DB_URL: ${TG_TEST_CREDITS_DB_URL:-}
      TG_TEST_PREVIEW_SOURCE_BOT_TOKEN: ${TG_TEST_PREVIEW_SOURCE_BOT_TOKEN:-}
      TG_PREVIEW_SOURCE_BOT_TOKEN: ${TG_BOT_TOKEN:-}
      TG_STATE_PREFIX: ${TG_PUBLIC_STATE_PREFIX:-blast:tg:public:chat_state}
      SUBSCRIPTION_CHANNEL: ${SUBSCRIPTION_CHANNEL:-@impulsemarketing}
      ORCHESTRATOR_PUBLIC_URL: ${ORCHESTRATOR_PUBLIC_URL:-http://orchestrator-api:8000}
      BOT_POLL_INTERVAL_S: ${BOT_POLL_INTERVAL_S:-5}
      BOT_STATUS_UPDATE_INTERVAL_S: ${BOT_STATUS_UPDATE_INTERVAL_S:-20}
      TG_DELIVERY_MODE: ${TG_DELIVERY_MODE:-polling}
      TG_WEBHOOK_URL: ${TG_WEBHOOK_URL:-}
      TG_WEBHOOK_SECRET: ${TG_WEBHOOK_SECRET:-}
      TG_WEBHOOK_PATH: ${TG_WEBHOOK_PATH:-/telegram/webhook}
      TG_WEBHOOK_BIND_HOST: ${TG_WEBHOOK_BIND_HOST:-0.0.0.0}
      TG_WEBHOOK_PORT: ${TG_WEBHOOK_PORT:-8081}
      TG_WEBHOOK_DEDUP_TTL_S: ${TG_WEBHOOK_DEDUP_TTL_S:-86400}
      TG_WEBHOOK_IP_ADDRESS: ${TG_WEBHOOK_IP_ADDRESS:-}
      TG_WEBHOOK_DELETE_ON_SHUTDOWN: ${TG_WEBHOOK_DELETE_ON_SHUTDOWN:-0}
      BOT_TMP_DIR: ${BOT_TMP_DIR_PUBLIC:-/app/work/tg_tmp_public}
      BOT_MAX_AUDIO_MB: ${BOT_MAX_AUDIO_MB:-5}
      CREDITS_DB_URL: ${CREDITS_DB_URL:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-}
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-prefer}
      ADMIN_PANEL_PORT: ${ADMIN_PANEL_PORT:-8080}
      ADMIN_PANEL_PASSWORD: ${ADMIN_PANEL_PASSWORD:-changeme}
      INITIAL_CREDITS: ${INITIAL_CREDITS:-2}
      MANAGER_CHAT_ID: ${MANAGER_CHAT_ID:-0}
      SURVEY_URL: ${SURVEY_URL:-https://forms.yandex.ru/u/69c52ce695add5c0264676e3}
      TBANK_TERMINAL_KEY: ${TBANK_TERMINAL_KEY:-}
      TBANK_PASSWORD: ${TBANK_PASSWORD:-}
      TBANK_NOTIFY_URL: ${TBANK_NOTIFY_URL:-}
      OFFER_URL: ${OFFER_URL:-}
    volumes:
      - ./work:/app/work
    ports:
      - "${TG_BOT_PUBLIC_RUNTIME_ADMIN_BIND_HOST:-127.0.0.1}:${TG_BOT_PUBLIC_RUNTIME_ADMIN_BIND_PORT:-18182}:${ADMIN_PANEL_PORT:-8080}"
      - "${TG_BOT_PUBLIC_WEBHOOK_BIND_HOST:-127.0.0.1}:${TG_BOT_PUBLIC_WEBHOOK_BIND_PORT:-18083}:${TG_WEBHOOK_PORT:-8081}"
    command: >
      bash -lc "python -m services.tg_bot_public.app"
    restart: unless-stopped

  tg-bot-public-admin:
    profiles:
      - ops
    image: ${BLAST_TG_BOT_PUBLIC_IMAGE:-blast_final-tg-bot-public:local}
    build:
      context: .
      dockerfile: Dockerfile.tg-bot-public
      network: host
    container_name: tg-bot-public-admin
    env_file:
      - .env
    environment:
      TG_BOT_API_ENV: ${TG_BOT_API_ENV:-prod}
      TG_BOT_TOKEN: ${TG_BOT_PUBLIC_TOKEN}
      TG_BOT_USERNAME: ${TG_BOT_USERNAME:-blast808bot}
      TG_TEST_BOT_TOKEN: ${TG_TEST_BOT_TOKEN:-}
      TG_TEST_BOT_USERNAME: ${TG_TEST_BOT_USERNAME:-}
      TG_TEST_BYPASS_SUBSCRIPTION: ${TG_TEST_BYPASS_SUBSCRIPTION:-0}
      TG_TEST_CREDITS_DB_URL: ${TG_TEST_CREDITS_DB_URL:-}
      TG_TEST_PREVIEW_SOURCE_BOT_TOKEN: ${TG_TEST_PREVIEW_SOURCE_BOT_TOKEN:-}
      TG_PREVIEW_SOURCE_BOT_TOKEN: ${TG_BOT_TOKEN:-}
      TG_STATE_PREFIX: ${TG_PUBLIC_STATE_PREFIX:-blast:tg:public:chat_state}
      SUBSCRIPTION_CHANNEL: ${SUBSCRIPTION_CHANNEL:-@impulsemarketing}
      ORCHESTRATOR_PUBLIC_URL: ${ORCHESTRATOR_PUBLIC_URL:-}
      TG_FILE_PROXY_URL: ${TG_FILE_PROXY_URL:-}
      CREDITS_DB_URL: ${CREDITS_DB_URL:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-}
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-prefer}
      ADMIN_PANEL_PORT: ${ADMIN_PANEL_PORT:-8080}
      ADMIN_PANEL_PASSWORD: ${ADMIN_PANEL_PASSWORD:-changeme}
      INITIAL_CREDITS: ${INITIAL_CREDITS:-2}
      MANAGER_CHAT_ID: ${MANAGER_CHAT_ID:-0}
      SURVEY_URL: ${SURVEY_URL:-https://forms.yandex.ru/u/69c52ce695add5c0264676e3}
      TBANK_TERMINAL_KEY: ${TBANK_TERMINAL_KEY:-}
      TBANK_PASSWORD: ${TBANK_PASSWORD:-}
      TBANK_NOTIFY_URL: ${TBANK_NOTIFY_URL:-}
      OFFER_URL: ${OFFER_URL:-}
    volumes:
      - ./work:/app/work
    ports:
      - "${TG_BOT_PUBLIC_ADMIN_BIND_HOST:-127.0.0.1}:${TG_BOT_PUBLIC_ADMIN_BIND_PORT:-18081}:${ADMIN_PANEL_PORT:-8080}"
    command: >
      bash -lc "python -m services.tg_bot_public.admin_only"
    restart: unless-stopped

  asset-ui:
    image: ${BLAST_ASSET_UI_IMAGE:-blast_final-asset-ui:local}
    build:
      context: .
      dockerfile: Dockerfile.asset-ui
      network: host
    container_name: asset-ui
    env_file:
      - .env
    environment:
      ASSET_UI_PORT: ${ASSET_UI_PORT:?ASSET_UI_PORT is required}
      ASSET_UI_UPLOAD_MAX_MB: ${ASSET_UI_UPLOAD_MAX_MB:?ASSET_UI_UPLOAD_MAX_MB is required}
      ASSET_UI_TRASH_PREFIX: ${ASSET_UI_TRASH_PREFIX:?ASSET_UI_TRASH_PREFIX is required}
      ASSET_UI_PRESIGN_TTL_S: ${ASSET_UI_PRESIGN_TTL_S:?ASSET_UI_PRESIGN_TTL_S is required}
    ports:
      - "127.0.0.1:18173:${ASSET_UI_PORT:?ASSET_UI_PORT is required}"
    command: >
      bash -lc "python -m services.asset_ui.run_uvicorn"
    restart: unless-stopped

  finance-bot:
    image: ${BLAST_FINANCE_BOT_IMAGE:-blast_final-finance-bot:local}
    build:
      context: ./finance_bot
      dockerfile: Dockerfile
      network: host
    container_name: finance-bot
    environment:
      DB_PATH: /app/data/finance.db
      GROQ_PROXY: ${GROQ_PROXY:-}
    volumes:
      - ./finance_bot_data:/app/data
    ports:
      - "127.0.0.1:18082:8080"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    profiles:
      - storage
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_REGION: ${MINIO_REGION}
    command: server /data --console-address ":9001"
    volumes:
      - ./work/minio-data:/data
    ports:
      - "${MINIO_BIND_HOST:-127.0.0.1}:${MINIO_API_PORT:-19100}:9000"
      - "${MINIO_BIND_HOST:-127.0.0.1}:${MINIO_CONSOLE_PORT:-19101}:9001"
    restart: unless-stopped
