server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values:
              - com.docker.compose.service=orchestrator-api
              - com.docker.compose.service=worker-build
              - com.docker.compose.service=worker-render
              - com.docker.compose.service=tg-bot-public
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/?(.*)'
        target_label: container
      - target_label: job
        replacement: docker
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      - target_label: env
        replacement: ${OBS_ENV}
    pipeline_stages:
      - static_labels:
          source: docker
      - regex:
          expression: '(?i)(?:job_id=|job[ _-]?id[:= ]+)(?P<job_id>[a-f0-9]{32})'
      - labels:
          job_id:
