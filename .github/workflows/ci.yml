name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Python + Landing
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile tg_bot_public
        run: |
          set -euo pipefail
          python -m py_compile \
            services/tg_bot_public/*.py \
            scripts/migrate_credits_sqlite_to_postgres.py

      - name: Validate landing bundle
        run: |
          set -euo pipefail
          python scripts/landing_validate.py --root landing
