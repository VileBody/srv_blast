- hosts: all
  gather_facts: false
  vars:
    repo_root: "{{ playbook_dir }}/../.."
    dev_root: C:\ae_dev
    repo_dir: "{{ dev_root }}\\repo"
    logs_dir: "{{ dev_root }}\\logs"
    test_node_url: "http://127.0.0.1:8000"
    start_afterfx: true
    kill_afterfx_first: true
    health_timeout_sec: 180
    health_poll_sec: 2

  tasks:
    - name: Ensure repo/log directories exist
      ansible.windows.win_file:
        path: "{{ item }}"
        state: directory
      loop:
        - "{{ repo_dir }}"
        - "{{ logs_dir }}"

    - name: Copy runtime operational scripts
      ansible.windows.win_copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
      loop:
        - src: "{{ repo_root }}/windows/render-node-runtime/run_server.ps1"
          dest: "{{ repo_dir }}\\run_server.ps1"
        - src: "{{ repo_root }}/windows/render-node-runtime/ae_modal_watcher.ps1"
          dest: "{{ repo_dir }}\\ae_modal_watcher.ps1"
        - src: "{{ repo_root }}/windows/render-node-runtime/ae_click_continue_once.ps1"
          dest: "{{ repo_dir }}\\ae_click_continue_once.ps1"
        - src: "{{ repo_root }}/windows/render-node-runtime/ae_dont_send_once.ps1"
          dest: "{{ repo_dir }}\\ae_dont_send_once.ps1"
        - src: "{{ repo_root }}/windows/render-node-runtime/restart_node_workflow.ps1"
          dest: "{{ repo_dir }}\\restart_node_workflow.ps1"

    - name: Run restart workflow
      ansible.windows.win_shell: |
        powershell.exe -NoProfile -ExecutionPolicy Bypass `
          -File "{{ repo_dir }}\restart_node_workflow.ps1" `
          -DevRoot "{{ dev_root }}" `
          -NodeUrl "{{ test_node_url }}" `
          -StartAfterFX {{ '$true' if start_afterfx else '$false' }} `
          -KillAfterFXFirst {{ '$true' if kill_afterfx_first else '$false' }} `
          -HealthTimeoutSec {{ health_timeout_sec }} `
          -HealthPollSec {{ health_poll_sec }} `
          -LogPath "{{ logs_dir }}\node_restart_workflow.log"
      register: restart_out
      failed_when: restart_out.rc != 0

    - name: Show restart workflow output
      ansible.builtin.debug:
        var: restart_out.stdout_lines

    - name: Tail restart workflow log
      ansible.windows.win_shell: |
        if (Test-Path "{{ logs_dir }}\node_restart_workflow.log") {
          Get-Content "{{ logs_dir }}\node_restart_workflow.log" -Tail 120
        } else {
          Write-Output "NO_WORKFLOW_LOG"
        }
      register: workflow_log_out
      failed_when: false

    - name: Show restart workflow log tail
      ansible.builtin.debug:
        var: workflow_log_out.stdout_lines
