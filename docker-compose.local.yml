services:
  redis:
    image: redis:7-alpine
    container_name: redis-local
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - local_net

  tg-bot-public:
    build:
      context: .
      dockerfile: Dockerfile.tg-bot-public
    container_name: tg-bot-public
    env_file:
      - .env
    environment:
      TG_BOT_TOKEN: ${TG_BOT_PUBLIC_TOKEN}
      TG_STATE_PREFIX: blast:tg:public:chat_state
      SUBSCRIPTION_CHANNEL: ${SUBSCRIPTION_CHANNEL:-@impulsemarketing}
      ORCHESTRATOR_PUBLIC_URL: ${ORCHESTRATOR_PUBLIC_URL:-http://orchestrator-api:8000}
      BOT_POLL_INTERVAL_S: ${BOT_POLL_INTERVAL_S:-5}
      BOT_STATUS_UPDATE_INTERVAL_S: ${BOT_STATUS_UPDATE_INTERVAL_S:-20}
      BOT_TMP_DIR: /app/work/tg_tmp_public
      BOT_MAX_AUDIO_MB: ${BOT_MAX_AUDIO_MB:-5}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_USERNAME: ""
      CREDITS_DB_URL: ${CREDITS_DB_URL:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-}
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-prefer}
      ADMIN_PANEL_PORT: "8080"
      ADMIN_PANEL_PASSWORD: ${ADMIN_PANEL_PASSWORD:-changeme}
      MANAGER_CHAT_ID: ${MANAGER_CHAT_ID:-0}
      ADMIN_PANEL_PUBLIC_URL: ${ADMIN_PANEL_PUBLIC_URL:-}
      INITIAL_CREDITS: ${INITIAL_CREDITS:-2}
      TBANK_NOTIFY_URL: ${TBANK_NOTIFY_URL:-}
    ports:
      - "8080:8080"
    volumes:
      - ./work:/app/work
    command: >
      bash -lc "python -m services.tg_bot_public.app"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - local_net
      - srv_blast_default

networks:
  local_net:
  srv_blast_default:
    external: true
