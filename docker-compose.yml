version: "3.9"

services:
  redis:
    image: redis:7
    container_name: blast-redis
    ports:
      - "6379:6379"

  ml-core:
    build:
      context: .
      dockerfile: Dockerfile.ml-core
    container_name: blast-ml-core
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DESCRIPTIONS_DIR: /app/descriptions
      PINS_DIR: /app/pins
      WORK_DIR: /app/work
      OUTPUT_DIR: /app/output
      SOCKS_PROXY: ${SOCKS_PROXY:-}
      ALL_PROXY: ${SOCKS_PROXY:-}
      HTTPS_PROXY: ${SOCKS_PROXY:-}
      HTTP_PROXY: ${SOCKS_PROXY:-}
    volumes:
      - ./descriptions:/app/descriptions:ro
      - ./pins:/app/pins:ro
      - ./work:/app/work
      - ./output:/app/output
      - ./data/audio:/data/audio
    depends_on:
      - redis

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: blast-orchestrator
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      AUDIO_DIR: /data/audio
      SOCKS_PROXY: ${SOCKS_PROXY:-}
      ALL_PROXY: ${SOCKS_PROXY:-}
      HTTPS_PROXY: ${SOCKS_PROXY:-}
      HTTP_PROXY: ${SOCKS_PROXY:-}
    volumes:
      - ./data/audio:/data/audio
    ports:
      - "8000:8000"
    depends_on:
      - redis
