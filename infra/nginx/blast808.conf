server {
    listen 80;
    server_name blast808.com www.blast808.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name blast808.com www.blast808.com;

    ssl_certificate     /etc/letsencrypt/live/blast808.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blast808.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Long-lived caching for versioned assets
    location ~* \.(woff2|png|svg|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript image/svg+xml application/json;
}
