services:
  github-runner:
    image: myoung34/github-runner:latest
    container_name: github-runner-blast
    restart: unless-stopped
    env_file:
      - .env.github-runner
    environment:
      REPO_URL: ${GH_RUNNER_REPO_URL}
      ACCESS_TOKEN: ${GH_RUNNER_ACCESS_TOKEN}
      RUNNER_SCOPE: repo
      RUNNER_NAME: ${GH_RUNNER_NAME:-blast-deploy-01}
      RUNNER_LABELS: ${GH_RUNNER_LABELS:-self-hosted,blast-deploy}
      RUNNER_WORKDIR: /tmp/runner/work
      DISABLE_AUTO_UPDATE: "true"
      CONFIGURED_ACTIONS_RUNNER_FILES_DIR: /runner-config
      DISABLE_AUTOMATIC_DEREGISTRATION: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - github-runner-config:/runner-config
      - github-runner-data:/tmp/runner
      - ${BLAST_REPO_DIR}:${BLAST_REPO_DIR}

volumes:
  github-runner-config:
  github-runner-data:
