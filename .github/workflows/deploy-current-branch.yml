name: Deploy Main (Legacy Single Node)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy (optional, defaults to selected ref)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.branch != '' && inputs.branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ vars.DEPLOY_SPLIT_ENABLED != 'true' }}
    name: Deploy On Self-Hosted Runner
    runs-on: [self-hosted, blast-deploy-infra]
    timeout-minutes: 30
    steps:
      - name: Validate Runner Repo Path
        env:
          REPO_DIR: ${{ vars.BLAST_REPO_DIR }}
        run: |
          set -euo pipefail
          if [ -z "${REPO_DIR:-}" ]; then
            echo "Repository variable BLAST_REPO_DIR is not set"
            exit 1
          fi
          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "BLAST_REPO_DIR does not point to a git repo: $REPO_DIR"
            exit 1
          fi

      - name: Checkout Workflow Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy Branch
        env:
          REPO_DIR: ${{ vars.BLAST_REPO_DIR }}
          BRANCH: ${{ inputs.branch != '' && inputs.branch || github.ref_name }}
          GIT_AUTH_TOKEN: ${{ secrets.DEPLOY_GH_TOKEN }}
          GITHUB_TOKEN_FALLBACK: ${{ github.token }}
          DEPLOY_ORCHESTRATOR_HA: ${{ vars.DEPLOY_ORCHESTRATOR_HA }}
          DEPLOY_ORCHESTRATOR_HA_COMPOSE_FILE: ${{ vars.DEPLOY_ORCHESTRATOR_HA_COMPOSE_FILE }}
          INFRA_ADMIN_PANEL_PUBLIC_URL: ${{ vars.INFRA_ADMIN_PANEL_PUBLIC_URL }}
        run: |
          set -euo pipefail
          AUTH_TOKEN="${GIT_AUTH_TOKEN:-${GITHUB_TOKEN_FALLBACK:-}}"
          if [ -z "${AUTH_TOKEN:-}" ]; then
            echo "GitHub token is missing for non-interactive deploy."
            exit 1
          fi

          git_run() {
            git -C "$REPO_DIR" \
              -c "url.https://x-access-token:${AUTH_TOKEN}@github.com/.insteadof=git@github.com:" \
              -c "url.https://x-access-token:${AUTH_TOKEN}@github.com/.insteadof=ssh://git@github.com/" \
              -c "url.https://x-access-token:${AUTH_TOKEN}@github.com/.insteadof=https://github.com/" \
              "$@"
          }

          # Force repo state to exact remote branch tip on the self-hosted runner.
          # This prevents ff-only pull failures when local commits drift on server.
          git_run fetch origin "$BRANCH"
          if git -C "$REPO_DIR" show-ref --verify --quiet "refs/heads/$BRANCH"; then
            git_run checkout -f "$BRANCH"
          else
            git_run checkout -B "$BRANCH" "origin/$BRANCH"
          fi
          git_run reset --hard "origin/$BRANCH"

          # Bootstrap for legacy server states where this runtime file was tracked and modified.
          if git -C "$REPO_DIR" ls-files --error-unmatch data/footage_inventory_selected.json >/dev/null 2>&1; then
            git -C "$REPO_DIR" restore --staged --worktree -- data/footage_inventory_selected.json || true
          fi
          bash "$REPO_DIR/infra/runners/deploy_branch.sh" "$BRANCH"

      - name: Deploy Orchestrator Nginx (optional)
        env:
          REPO_DIR: ${{ vars.BLAST_REPO_DIR }}
          BRANCH: ${{ inputs.branch != '' && inputs.branch || github.ref_name }}
          ORCHESTRATOR_NGINX_DEPLOY_ENABLED: ${{ vars.ORCHESTRATOR_NGINX_DEPLOY_ENABLED }}
          ORCHESTRATOR_NGINX_MAIN_ONLY: ${{ vars.ORCHESTRATOR_NGINX_MAIN_ONLY }}
          ORCHESTRATOR_NGINX_MAIN_BRANCH: ${{ vars.ORCHESTRATOR_NGINX_MAIN_BRANCH }}
          ORCHESTRATOR_NGINX_UPSTREAM_TEMPLATE: ${{ vars.ORCHESTRATOR_NGINX_UPSTREAM_TEMPLATE }}
          ORCHESTRATOR_NGINX_LOCATIONS_TEMPLATE: ${{ vars.ORCHESTRATOR_NGINX_LOCATIONS_TEMPLATE }}
          ORCHESTRATOR_NGINX_UPSTREAM_TARGET: ${{ vars.ORCHESTRATOR_NGINX_UPSTREAM_TARGET }}
          ORCHESTRATOR_NGINX_LOCATIONS_TARGET: ${{ vars.ORCHESTRATOR_NGINX_LOCATIONS_TARGET }}
          ORCHESTRATOR_NGINX_RELOAD_CMD: ${{ vars.ORCHESTRATOR_NGINX_RELOAD_CMD }}
          ORCHESTRATOR_NGINX_REMOTE_ENABLED: ${{ vars.ORCHESTRATOR_NGINX_REMOTE_ENABLED }}
          ORCHESTRATOR_NGINX_REMOTE_HOST: ${{ vars.ORCHESTRATOR_NGINX_REMOTE_HOST }}
          ORCHESTRATOR_NGINX_REMOTE_USER: ${{ vars.ORCHESTRATOR_NGINX_REMOTE_USER }}
          ORCHESTRATOR_NGINX_REMOTE_PORT: ${{ vars.ORCHESTRATOR_NGINX_REMOTE_PORT }}
          ORCHESTRATOR_NGINX_REMOTE_SSH_PRIVATE_KEY: ${{ secrets.ORCHESTRATOR_NGINX_REMOTE_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          remote_flag="$(printf '%s' "${ORCHESTRATOR_NGINX_REMOTE_ENABLED:-}" | tr '[:upper:]' '[:lower:]')"
          if [ "$remote_flag" = "1" ] || [ "$remote_flag" = "true" ] || [ "$remote_flag" = "yes" ] || [ "$remote_flag" = "on" ]; then
            if [ -z "${ORCHESTRATOR_NGINX_REMOTE_HOST:-}" ]; then
              echo "ORCHESTRATOR_NGINX_REMOTE_ENABLED=true requires ORCHESTRATOR_NGINX_REMOTE_HOST"
              exit 1
            fi
            if [ -z "${ORCHESTRATOR_NGINX_REMOTE_SSH_PRIVATE_KEY:-}" ]; then
              echo "ORCHESTRATOR_NGINX_REMOTE_ENABLED=true requires secret ORCHESTRATOR_NGINX_REMOTE_SSH_PRIVATE_KEY"
              exit 1
            fi
            install -d -m 700 "$HOME/.ssh"
            key_path="$HOME/.ssh/orchestrator_nginx_ci"
            printf '%s\n' "$ORCHESTRATOR_NGINX_REMOTE_SSH_PRIVATE_KEY" > "$key_path"
            chmod 600 "$key_path"
            cleanup_key() {
              rm -f "$key_path"
            }
            trap cleanup_key EXIT

            ORCHESTRATOR_NGINX_REMOTE_HOST="$ORCHESTRATOR_NGINX_REMOTE_HOST" \
            ORCHESTRATOR_NGINX_REMOTE_USER="${ORCHESTRATOR_NGINX_REMOTE_USER:-blast}" \
            ORCHESTRATOR_NGINX_REMOTE_PORT="${ORCHESTRATOR_NGINX_REMOTE_PORT:-22}" \
            ORCHESTRATOR_NGINX_REMOTE_SSH_KEY_PATH="$key_path" \
            REPO_DIR="$GITHUB_WORKSPACE" \
            bash "$GITHUB_WORKSPACE/infra/runners/deploy_orchestrator_nginx_remote.sh" "$BRANCH"
          else
            REPO_DIR="$GITHUB_WORKSPACE" \
            bash "$GITHUB_WORKSPACE/infra/runners/deploy_orchestrator_nginx.sh" "$BRANCH"
          fi

      - name: Deploy Landing To Nginx (optional)
        env:
          REPO_DIR: ${{ vars.BLAST_REPO_DIR }}
          BRANCH: ${{ inputs.branch != '' && inputs.branch || github.ref_name }}
          LANDING_NGINX_DEPLOY_ENABLED: ${{ vars.LANDING_NGINX_DEPLOY_ENABLED }}
          LANDING_NGINX_MAIN_ONLY: ${{ vars.LANDING_NGINX_MAIN_ONLY }}
          LANDING_NGINX_MAIN_BRANCH: ${{ vars.LANDING_NGINX_MAIN_BRANCH }}
          LANDING_NGINX_DOCROOT: ${{ vars.LANDING_NGINX_DOCROOT }}
          LANDING_NGINX_RELOAD_CMD: ${{ vars.LANDING_NGINX_RELOAD_CMD }}
          LANDING_NGINX_SYNC_MODE: ${{ vars.LANDING_NGINX_SYNC_MODE }}
        run: |
          set -euo pipefail
          REPO_DIR="$GITHUB_WORKSPACE" \
          bash "$GITHUB_WORKSPACE/infra/runners/deploy_landing_to_nginx.sh" "$BRANCH"
