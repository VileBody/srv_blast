services:
  promtail-edge:
    image: grafana/promtail:3.0.0
    container_name: promtail-edge
    restart: unless-stopped
    command:
      - -config.file=/etc/promtail/config.yml
      - -config.expand-env=true
    env_file:
      - .env.promtail-edge
    volumes:
      - ./observability/promtail-edge-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_edge_positions:/tmp

volumes:
  promtail_edge_positions:

