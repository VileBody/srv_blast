name: Deploy Rust Gen Manager

on:
  workflow_dispatch:
    inputs:
      image:
        description: Immutable GHCR image reference (image@sha256:...)
        required: false
        type: string
      install_manager:
        description: Install or replace the manager image on the Rust Gen node
        required: true
        default: true
        type: boolean
      enable_orchestrator:
        description: Write manager URL/token and restart the orchestrator render services
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: rust-gen-manager-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, blast-deploy-infra]
    timeout-minutes: 30
    env:
      REPO_DIR: ${{ vars.BLAST_REPO_DIR_INFRA != '' && vars.BLAST_REPO_DIR_INFRA || vars.BLAST_REPO_DIR }}
      RUST_GEN_DEPLOY_HOST: ${{ vars.RUST_GEN_DEPLOY_HOST }}
      RUST_GEN_MANAGER_IMAGE: ${{ inputs.image }}
      RUST_GEN_MANAGER_TOKEN: ${{ secrets.RUST_GEN_MANAGER_TOKEN }}
      RUST_GEN_REGISTRY_TOKEN: ${{ secrets.RUST_GEN_REGISTRY_TOKEN }}
      DEPLOY_PROD_NODE0_HOST: ${{ vars.DEPLOY_PROD_NODE0_HOST }}
      DEPLOY_PROD_NODE0_USER: ${{ vars.DEPLOY_PROD_NODE0_USER }}
      DEPLOY_PROD_NODE0_PORT: ${{ vars.DEPLOY_PROD_NODE0_PORT }}
      DEPLOY_PROD_NODE0_REPO_DIR: ${{ vars.DEPLOY_PROD_NODE0_REPO_DIR }}
      DEPLOY_PROD_NODE1_HOST: ${{ vars.DEPLOY_PROD_NODE1_HOST }}
      DEPLOY_PROD_NODE1_USER: ${{ vars.DEPLOY_PROD_NODE1_USER }}
      DEPLOY_PROD_NODE1_PORT: ${{ vars.DEPLOY_PROD_NODE1_PORT }}
      DEPLOY_PROD_NODE1_REPO_DIR: ${{ vars.DEPLOY_PROD_NODE1_REPO_DIR }}
      DEPLOY_PROD_NODE0_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_PROD_NODE0_SSH_PRIVATE_KEY }}
      DEPLOY_PROD_NODE1_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_PROD_NODE1_SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate immutable deployment inputs
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RUST_GEN_DEPLOY_HOST"
          : "${RUST_GEN_MANAGER_TOKEN:?RUST_GEN_MANAGER_TOKEN secret is required}"
          if [[ "${{ inputs.install_manager }}" == "true" ]]; then
            test "${RUST_GEN_MANAGER_IMAGE#*@sha256:}" != "$RUST_GEN_MANAGER_IMAGE"
            : "${RUST_GEN_REGISTRY_TOKEN:?RUST_GEN_REGISTRY_TOKEN secret is required}"
          fi

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_PROD_NODE0_SSH_PRIVATE_KEY" > "$HOME/.ssh/rust_gen"
          chmod 600 "$HOME/.ssh/rust_gen"

      - name: Install immutable manager image
        if: ${{ inputs.install_manager }}
        shell: bash
        run: |
          set -euo pipefail
          key="$HOME/.ssh/rust_gen"
          ssh_base=(ssh -i "$key" -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 root@"$RUST_GEN_DEPLOY_HOST")
          scp -i "$key" -o BatchMode=yes -o StrictHostKeyChecking=accept-new infra/rust-gen/rust-gen-manager.service "root@$RUST_GEN_DEPLOY_HOST:/tmp/rust-gen-manager.service"
          scp -i "$key" -o BatchMode=yes -o StrictHostKeyChecking=accept-new infra/rust-gen/rust-gen-firewall.nft infra/rust-gen/rust-gen-firewall.service "root@$RUST_GEN_DEPLOY_HOST:/tmp/"
          "${ssh_base[@]}" "install -D -m 600 /tmp/rust-gen-firewall.nft /etc/nftables.d/rust-gen-manager.nft; install -m 644 /tmp/rust-gen-firewall.service /etc/systemd/system/rust-gen-firewall.service; rm -f /tmp/rust-gen-firewall.nft /tmp/rust-gen-firewall.service; systemctl daemon-reload; systemctl enable --now rust-gen-firewall.service"
          "${ssh_base[@]}" "set -euo pipefail; id rustgen >/dev/null; install -d -o rustgen -g rustgen -m 700 /home/rustgen/.config/rust-gen /home/rustgen/.config/systemd/user; loginctl enable-linger rustgen; runuser -u rustgen -- env XDG_RUNTIME_DIR=/run/user/\$(id -u rustgen) systemctl --user enable --now podman.socket"
          printf '%s' "$RUST_GEN_REGISTRY_TOKEN" | "${ssh_base[@]}" "runuser -u rustgen -- podman login --username VileBody --password-stdin ghcr.io"
          "${ssh_base[@]}" "install -o rustgen -g rustgen -m 600 /tmp/rust-gen-manager.service /home/rustgen/.config/systemd/user/rust-gen-manager.service; rm -f /tmp/rust-gen-manager.service"
          {
            printf 'RUST_GEN_MANAGER_IMAGE=%s\n' "$RUST_GEN_MANAGER_IMAGE"
            printf 'RUST_GEN_RENDERER_IMAGE=%s\n' "$RUST_GEN_MANAGER_IMAGE"
            printf 'RUST_GEN_MANAGER_PULL=1\n'
            printf 'RUST_GEN_MANAGER_TOKEN=%s\n' "$RUST_GEN_MANAGER_TOKEN"
            printf 'RUST_GEN_WORK_ROOT=/var/lib/rust-gen/jobs\n'
            printf 'RUST_GEN_MAX_PARALLEL_JOBS=1\n'
            printf 'RUST_GEN_DEFAULT_TIMEOUT_S=1800\n'
            printf 'RUST_GEN_DEFAULT_MEMORY=12g\n'
            printf 'RUST_GEN_DEFAULT_CPUS=6\n'
            printf 'RUST_GEN_JOB_RETENTION_S=86400\n'
          } | "${ssh_base[@]}" "umask 077; cat > /home/rustgen/.config/rust-gen/manager.env; chown rustgen:rustgen /home/rustgen/.config/rust-gen/manager.env; runuser -u rustgen -- env XDG_RUNTIME_DIR=/run/user/\$(id -u rustgen) systemctl --user daemon-reload; runuser -u rustgen -- env XDG_RUNTIME_DIR=/run/user/\$(id -u rustgen) systemctl --user restart rust-gen-manager; sleep 3; curl --fail --silent http://127.0.0.1:8090/health"

      - name: Enable private canary route in both orchestrators
        if: ${{ inputs.enable_orchestrator }}
        shell: bash
        run: |
          set -euo pipefail
          key="$HOME/.ssh/rust_gen"
          configure_node() {
            local host="$1" user="$2" port="$3" repo="$4"
            local script
            read -r -d '' script <<'REMOTE' || true
          set -euo pipefail
          repo="$1"
          manager_url="$2"
          manager_token="$3"
          manager_chat_id="$(awk -F= '/^[[:space:]]*MANAGER_CHAT_ID=/{ value=$2 } END { print value }' "$repo/.env" | tr -d '[:space:]')"
          test -n "$manager_chat_id"
          update_env() {
            local key="$1" value="$2" tmp
            tmp="$(mktemp)"
            awk -v key="$key" -v value="$value" '$0 ~ "^[[:space:]]*" key "=" { if (!done) { print key "=" value; done=1 }; next } { print } END { if (!done) print key "=" value }' "$repo/.env" > "$tmp"
            mv "$tmp" "$repo/.env"
          }
          update_env RUST_GEN_ENABLED 1
          update_env RUST_GEN_MANAGER_URL "$manager_url"
          update_env RUST_GEN_MANAGER_TOKEN "$manager_token"
          update_env RUST_GEN_CANARY_ENABLED 1
          update_env RUST_GEN_BOT_DEFAULT_ENABLED 0
          update_env RUST_GEN_ALLOWED_CHAT_IDS "$manager_chat_id"
          cd "$repo"
          docker compose -f docker-compose.yml -f docker-compose.orchestrator-ha.yml up -d --force-recreate orchestrator-api orchestrator-api-2 worker-build worker-render worker-render-poll
          REMOTE
            ssh -i "$key" -p "$port" -o BatchMode=yes -o StrictHostKeyChecking=accept-new "$user@$host" "bash -s -- '$repo' 'http://$RUST_GEN_DEPLOY_HOST:8090' '$RUST_GEN_MANAGER_TOKEN'" <<< "$script"
          }
          configure_node "$DEPLOY_PROD_NODE0_HOST" "${DEPLOY_PROD_NODE0_USER:-deploy}" "${DEPLOY_PROD_NODE0_PORT:-22}" "$DEPLOY_PROD_NODE0_REPO_DIR"
          configure_node "$DEPLOY_PROD_NODE1_HOST" "${DEPLOY_PROD_NODE1_USER:-deploy}" "${DEPLOY_PROD_NODE1_PORT:-22}" "$DEPLOY_PROD_NODE1_REPO_DIR"

      - name: Verify private manager reachability
        if: ${{ inputs.enable_orchestrator }}
        shell: bash
        run: |
          set -euo pipefail
          key="$HOME/.ssh/rust_gen"
          verify_node() {
            local host="$1" user="$2" port="$3"
            ssh -i "$key" -p "$port" -o BatchMode=yes -o StrictHostKeyChecking=accept-new "$user@$host" "curl --fail --silent --connect-timeout 10 http://$RUST_GEN_DEPLOY_HOST:8090/health"
          }
          verify_node "$DEPLOY_PROD_NODE0_HOST" "${DEPLOY_PROD_NODE0_USER:-deploy}" "${DEPLOY_PROD_NODE0_PORT:-22}"
          verify_node "$DEPLOY_PROD_NODE1_HOST" "${DEPLOY_PROD_NODE1_USER:-deploy}" "${DEPLOY_PROD_NODE1_PORT:-22}"
